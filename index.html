<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>TOEIC 高頻字快刷</title>
<style>
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
         background: #070B14; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #E2ECF7; }
  .box { background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.09); border-radius: 18px;
         padding: 28px 24px; width: min(92vw, 360px);
         box-shadow: 0 18px 50px rgba(0,0,0,.42); text-align: center; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: #7C93A8; font-size: 13px; margin-bottom: 18px; }
  input[type="password"] { width: 100%; font-size: 20px; text-align: center; letter-spacing: .3em;
         padding: 10px 12px; border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; box-sizing: border-box;
         background: rgba(255,255,255,0.05); color: #E2ECF7; }
  button { width: 100%; margin-top: 12px; padding: 11px; font-size: 16px; font-weight: 800; color: #06251f;
         background: linear-gradient(90deg, #2DD4BF, #818CF8); border: 0; border-radius: 10px; cursor: pointer; }
  label { display: flex; gap: 6px; align-items: center; justify-content: center; margin-top: 12px;
         color: #7C93A8; font-size: 13px; }
  #err { color: #FB7185; font-size: 14px; font-weight: 700; margin-top: 10px; min-height: 1.2em; }
  #busy { color: #7C93A8; font-size: 13px; margin-top: 6px; min-height: 1.2em; }
</style>
</head>
<body>
<div class="box">
  <h1>🔒 TOEIC 高頻字快刷</h1>
  <div class="sub">輸入密碼解鎖</div>
  <form id="f">
    <input id="pw" type="password" inputmode="numeric" autocomplete="off" autofocus>
    <button type="submit">解鎖</button>
    <label><input id="remember" type="checkbox" checked> 記住這台裝置</label>
  </form>
  <div id="err"></div>
  <div id="busy"></div>
</div>

const STORE_KEY = "tf600_gate";

function b64ToBuf(b64) {
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf;
}

async function tryUnlock(pw, remember, silent) {
  const busy = document.getElementById("busy");
  const err = document.getElementById("err");
  err.textContent = "";
  busy.textContent = "解鎖中…";
  try {
    const hash = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
    const key = await crypto.subtle.importKey("raw", hash, { name: "AES-CBC" }, false, ["decrypt"]);
    const plainBuf = await crypto.subtle.decrypt({ name: "AES-CBC", iv: b64ToBuf(IV_B64) }, key, b64ToBuf(CT_B64));
    const text = new TextDecoder().decode(plainBuf);
    if (!text.startsWith("OK::")) throw new Error("bad prefix");
    if (remember) { try { localStorage.setItem(STORE_KEY, pw); } catch (e) {} }
    const html = text.slice(4);
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    busy.textContent = "";
    if (!silent) err.textContent = "密碼不對，再試一次";
  }
}

document.getElementById("f").addEventListener("submit", (e) => {
  e.preventDefault();
  tryUnlock(document.getElementById("pw").value.trim(), document.getElementById("remember").checked, false);
});

(function auto() {
  const m = location.hash.match(/^#k=(.+)$/);
  if (m) { tryUnlock(decodeURIComponent(m[1]), true, false); return; }
  let saved = null;
  try { saved = localStorage.getItem(STORE_KEY); } catch (e) {}
  if (saved) tryUnlock(saved, false, true);
})();
</script>
