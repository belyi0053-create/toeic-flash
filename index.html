<title>TOEIC 高頻字快刷</title>
<style>
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
         background: #070B14; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; color: #E2ECF7; }
  .box { background: rgba(255,255,255,0.035); border: 1px solid rgba(255,255,255,0.09); border-radius: 18px;
         padding: 28px 24px; width: min(92vw, 360px);
         box-shadow: 0 18px 50px rgba(0,0,0,.42); text-align: center; }
  h1 { font-size: 20px; margin: 0 0 4px; }
  .sub { color: #7C93A8; font-size: 13px; margin-bottom: 18px; }
  input[type="password"] { width: 100%; font-size: 20px; text-align: center; letter-spacing: .3em;
         padding: 10px 12px; border: 1px solid rgba(255,255,255,0.15); border-radius: 10px; box-sizing: border-box;
         background: rgba(255,255,255,0.05); color: #E2ECF7; }
  button { width: 100%; margin-top: 12px; padding: 11px; font-size: 16px; font-weight: 800; color: #06251f;
         background: linear-gradient(90deg, #2DD4BF, #818CF8); border: 0; border-radius: 10px; cursor: pointer; }
  label { display: flex; gap: 6px; align-items: center; justify-content: center; margin-top: 12px;
         color: #7C93A8; font-size: 13px; }
  #err { color: #FB7185; font-size: 14px; font-weight: 700; margin-top: 10px; min-height: 1.2em; }
  #busy { color: #7C93A8; font-size: 13px; margin-top: 6px; min-height: 1.2em; }
</style>
</head>

<div class="box">
  <h1>🔒 TOEIC 高頻字快刷</h1>
  <div class="sub">輸入密碼解鎖</div>

    <input id="pw" type="password" inputmode="numeric" autocomplete="off" autofocus>
    <button type="submit">解鎖</button>
    <label><input id="remember" type="checkbox" checked> 記住這台裝置</label>
  </form>
  <div id="err"></div>
  <div id="busy"></div>
</div>

const STORE_KEY = "tf600_gate";

// 解鎖後若再出錯，把錯誤直接顯示在畫面上（手機沒有 console 可看）
function showFatal(msg) {
  try {
    const d = document.createElement("div");
    d.style.cssText = "position:fixed;left:8px;right:8px;bottom:8px;z-index:99999;background:#7f1d1d;color:#fff;" +
      "font:13px/1.5 ui-monospace,Menlo,monospace;padding:10px 12px;border-radius:10px;word-break:break-all;white-space:pre-wrap;";
    d.textContent = "⚠ " + msg;
    (document.body || document.documentElement).appendChild(d);
  } catch (e) {}
}
window.onerror = function (msg, src, line, col) { showFatal(msg + " @" + line + ":" + col); };
window.onunhandledrejection = function (ev) {
  showFatal("Promise: " + ((ev.reason && ev.reason.message) || ev.reason));
};

function b64ToBuf(b64) {
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
  return buf;
}

// 不用 document.open/write（自動解鎖搶在文件解析完成前觸發時，open 會 no-op、write 變成追加 → 門卡在畫面上）。
// 改成：DOMParser 解析 → 原地換 head/body → 重建 script 節點讓它執行。document 全程活著，無時序競態。
function mount(html) {
  const doc = new DOMParser().parseFromString(html, "text/html");
  if (!doc || !doc.head || !doc.body) throw new Error("bad payload");
  const lang = doc.documentElement.getAttribute("lang");
  if (lang) document.documentElement.setAttribute("lang", lang);
  document.documentElement.replaceChild(document.adoptNode(doc.head), document.head);
  document.documentElement.replaceChild(document.adoptNode(doc.body), document.body);
  const scripts = document.querySelectorAll("script");
  for (let i = 0; i < scripts.length; i++) {
    const old = scripts[i];
    const s = document.createElement("script");
    for (let j = 0; j < old.attributes.length; j++) s.setAttribute(old.attributes[j].name, old.attributes[j].value);
    s.textContent = old.textContent;
    old.parentNode.replaceChild(s, old);
  }
}

async function tryUnlock(pw, remember, silent) {
  const busy = document.getElementById("busy");
  const err = document.getElementById("err");
  err.textContent = "";
  busy.textContent = "解鎖中…";
  try {
    const hash = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
    const key = await crypto.subtle.importKey("raw", hash, { name: "AES-CBC" }, false, ["decrypt"]);
    const plainBuf = await crypto.subtle.decrypt({ name: "AES-CBC", iv: b64ToBuf(IV_B64) }, key, b64ToBuf(CT_B64));
    const text = new TextDecoder().decode(plainBuf);
    if (!text.startsWith("OK::")) throw new Error("bad prefix");
    if (remember) { try { localStorage.setItem(STORE_KEY, pw); } catch (e) {} }
    try { if (location.hash) history.replaceState(null, "", location.pathname + location.search); } catch (e) {}
    mount(text.slice(4));
  } catch (e) {
    busy.textContent = "";
    const wrongPw = e && (e.name === "OperationError" || e.message === "bad prefix");
    if (wrongPw) {
      if (silent) { try { localStorage.removeItem(STORE_KEY); } catch (e2) {} }
      else err.textContent = "密碼不對，再試一次";
    } else {
      err.textContent = "解鎖失敗（不是密碼問題）";
      showFatal((e && e.name ? e.name + ": " + e.message : String(e)));
    }
  }
}

document.getElementById("f").addEventListener("submit", (e) => {
  e.preventDefault();
  tryUnlock(document.getElementById("pw").value.trim(), document.getElementById("remember").checked, false);
});

(function auto() {
  const m = location.hash.match(/^#k=(.+)$/);
  if (m) { tryUnlock(decodeURIComponent(m[1]), true, false); return; }
  let saved = null;
  try { saved = localStorage.getItem(STORE_KEY); } catch (e) {}
  if (saved) tryUnlock(saved, false, true);
})();
</script>
